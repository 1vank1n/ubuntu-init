name: Update release asset

on:
  push:
    branches: [main]
    paths: [ubuntu-init.sh]

permissions:
  contents: write

jobs:
  update-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload ubuntu-init.sh to v1.0 release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload v1.0 ubuntu-init.sh --clobber
